<!DOCTYPE html><html><head><meta charset="utf-8"><title>tinygrad ASR</title><style>
  * { margin: 0; box-sizing: border-box }
  body { background: #212121; color: #e3e3e3; font-family: system-ui;
         height: 100vh; display: flex; flex-direction: column; align-items: center }
  h1 { padding: 20px; font-size: 1.1em; color: #888 }
  #transcript { flex: 1; overflow-y: auto; padding: 20px; max-width: 768px; width: 100%;
                font-size: 1.3em; line-height: 1.7; white-space: pre-wrap }
  #committed { color: #e3e3e3 }
  #pending { color: #777; font-style: italic }
  #placeholder { color: #555 }
  #controls { padding: 20px; display: flex; gap: 12px; align-items: center }
  button { padding: 12px 24px; border-radius: 24px; border: none;
           font: inherit; cursor: pointer; background: #2f2f2f; color: #e3e3e3 }
  button:hover { background: #3f3f3f }
  #mic.on { background: #c62828; color: white }
  #status { color: #888; font-size: 0.85em; min-width: 100px }
  #drop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none;
          align-items: center; justify-content: center; font-size: 2em; color: #aaa; z-index: 10 }

  /* Server info panel */
  #server-info { max-width: 768px; width: 100%; padding: 8px 20px; font-size: 0.75em; color: #555;
                 display: flex; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid #2a2a2a }
  #server-info .label { color: #666 }
  #server-info .val { color: #888 }

  /* Stats panel */
  #stats { max-width: 768px; width: 100%; padding: 0 20px 16px; display: none; font-size: 0.8em }
  #level-wrap { height: 4px; background: #333; border-radius: 2px; margin-bottom: 8px; overflow: hidden }
  #level { height: 100%; width: 0; background: #4caf50; transition: width 0.1s; border-radius: 2px }
  #stat-line { display: flex; gap: 16px; color: #777; flex-wrap: wrap }
  #stat-line .val { color: #aaa }
  #stat-detail { display: flex; gap: 16px; color: #555; margin-top: 4px; flex-wrap: wrap }
  #stat-detail .val { color: #777 }
</style></head><body>
<h1>tinygrad qwen3-asr &nbsp;<a href="/chat" style="color:#555;font-size:0.8em;text-decoration:none">chat &rarr;</a></h1>
<div id="server-info"></div>
<div id="transcript"><span id="committed"></span><span id="pending"></span><span id="placeholder">Click Record or drop an audio file</span></div>
<div id="controls">
  <button id="mic" onclick="toggleMic()">Record</button>
  <button onclick="document.getElementById('filepick').click()">Upload file</button>
  <input type="file" id="filepick" accept="audio/*" style="display:none" onchange="uploadFile(this.files[0])">
  <span id="status"></span>
</div>
<div id="stats">
  <div id="level-wrap"><div id="level"></div></div>
  <div id="stat-line"></div>
  <div id="stat-detail"></div>
</div>
<div id="drop">Drop audio file here</div>
<script>
const S = document.getElementById('status');
const statsEl = document.getElementById('stats');
const levelEl = document.getElementById('level');
const statLine = document.getElementById('stat-line');
const statDetail = document.getElementById('stat-detail');
const committedEl = document.getElementById('committed');
const pendingEl = document.getElementById('pending');
const placeholderEl = document.getElementById('placeholder');
let audioCtx, source, processor, pcmChunks, recording = false, sendTimer;
let ws = null, sentChunkIdx = 0, totalSent = 0;
let silentChunks = 0, muteWarned = false;

function setTranscript(committed, pending) {
  committedEl.textContent = committed || '';
  pendingEl.textContent = pending || '';
  placeholderEl.style.display = (committed || pending) ? 'none' : '';
}

// Convert Float32 PCM [-1,1] to Int16 LE for WebSocket binary send
function pcmToInt16(float32Arr) {
  const int16 = new Int16Array(float32Arr.length);
  for (let i = 0; i < float32Arr.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Arr[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return int16;
}

// Get NEW pcm samples since last send (delta)
function getDeltaPCM() {
  const newChunks = pcmChunks.slice(sentChunkIdx);
  sentChunkIdx = pcmChunks.length;
  let len = 0;
  for (const c of newChunks) len += c.length;
  const out = new Float32Array(len);
  let off = 0;
  for (const c of newChunks) { out.set(c, off); off += c.length; }
  totalSent += len;
  return out;
}

function stat(label, value) { return `${label} <span class="val">${value}</span>`; }

function updateStats(s) {
  if (!s || !s.chunk) { statLine.innerHTML = ''; statDetail.innerHTML = ''; return; }
  const rtfColor = s.rtf < 0.2 ? '#4caf50' : s.rtf < 0.5 ? '#ff9800' : '#f44336';
  statLine.innerHTML = [
    stat('time', s.audio_sec + 's'),
    stat('RTF', `<span style="color:${rtfColor}">${s.rtf.toFixed(2)}</span>`),
    stat('latency', s.total_ms + 'ms'),
    stat('windows', s.enc_windows + '/' + s.max_windows),
    stat('committed', (s.committed || 0) + ' tok'),
    stat('pending', (s.pending || 0) + ' tok'),
  ].join('');
  statDetail.innerHTML = [
    stat('enc', s.enc_ms + 'ms'),
    stat('prefill', s.prefill_ms + 'ms'),
    stat('decode', s.decode_ms + 'ms'),
    stat('kv reused', s.reused + '/' + s.prompt_len),
    stat('prefix fed', (s.prefix_fed || 0) + ' tok'),
    stat('chunk', '#' + s.chunk),
  ].join('');
}

function sendChunk() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const delta = getDeltaPCM();
  if (delta.length === 0) return;
  ws.send(pcmToInt16(delta).buffer);
  const dur = (totalSent / (audioCtx ? audioCtx.sampleRate : 16000)).toFixed(1);
  S.textContent = dur + 's...';
}

async function toggleMic() {
  if (recording) { stopMic(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { noiseSuppression: true, echoCancellation: true, autoGainControl: true }
    });
    audioCtx = new AudioContext({ sampleRate: 16000 });
    source = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    pcmChunks = []; sentChunkIdx = 0; totalSent = 0;
    silentChunks = 0; muteWarned = false;
    processor.onaudioprocess = e => {
      const data = e.inputBuffer.getChannelData(0);
      pcmChunks.push(new Float32Array(data));
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      const rms = Math.sqrt(sum / data.length);
      const pct = Math.min(100, (rms / 0.15) * 100);
      levelEl.style.width = pct + '%';
      levelEl.style.background = pct > 60 ? '#ff9800' : '#4caf50';
      // Mute detection: ~3s of silence at 16kHz/4096 = ~12 chunks
      if (rms < 0.001) { silentChunks++; } else { silentChunks = 0; muteWarned = false; }
      if (silentChunks >= 12 && !muteWarned) {
        muteWarned = true;
        S.textContent = 'No audio — is your microphone muted?';
        S.style.color = '#f44336';
      } else if (!muteWarned && recording) {
        S.style.color = '#888';
      }
    };
    source.connect(processor);
    processor.connect(audioCtx.destination);

    // Open WebSocket (runs on HTTP port + 1)
    const wsPort = parseInt(location.port || '8090') + 1;
    const sock = new WebSocket(`ws://${location.hostname}:${wsPort}`);
    sock.binaryType = 'arraybuffer';
    ws = sock;
    sock.onopen = () => {
      sock.send(JSON.stringify({type: 'start'}));
      sendTimer = setInterval(sendChunk, 2000);
    };
    sock.onmessage = e => {
      const d = JSON.parse(e.data);
      setTranscript(d.committed, d.pending);
      if (d.stats) updateStats(d.stats);
      if (d.status === 'done') S.textContent = '';
    };
    sock.onerror = () => { S.textContent = 'WebSocket error'; };
    sock.onclose = () => { if (ws === sock) ws = null; };

    recording = true;
    document.getElementById('mic').textContent = 'Stop';
    document.getElementById('mic').className = 'on';
    statsEl.style.display = 'block';
    S.textContent = 'Listening...';
  } catch(e) { S.textContent = 'Mic error: ' + e.message; }
}

function stopMic() {
  clearInterval(sendTimer);
  processor.disconnect(); source.disconnect();
  source.mediaStream.getTracks().forEach(t => t.stop());
  audioCtx.close();
  recording = false;
  document.getElementById('mic').textContent = 'Record';
  document.getElementById('mic').className = '';
  levelEl.style.width = '0';
  S.textContent = 'Finalizing...';
  // Send remaining audio + end signal
  if (ws && ws.readyState === WebSocket.OPEN) {
    const delta = getDeltaPCM();
    if (delta.length > 0) ws.send(pcmToInt16(delta).buffer);
    ws.send(JSON.stringify({type: 'end'}));
  }
}

async function uploadFile(file) {
  if (!file) return;
  S.textContent = 'Transcribing ' + file.name + '...';
  statsEl.style.display = 'none';
  const fd = new FormData();
  fd.append('file', file, file.name);
  try {
    const r = await fetch('/v1/audio/transcriptions', { method: 'POST', body: fd });
    const d = await r.json();
    setTranscript(d.text, '');
    S.textContent = '';
  } catch(e) { S.textContent = 'Error: ' + e.message; }
}

// Drag and drop
document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop').style.display = 'flex'; });
document.addEventListener('dragleave', e => { if (e.relatedTarget === null) document.getElementById('drop').style.display = 'none'; });
document.addEventListener('drop', e => {
  e.preventDefault(); document.getElementById('drop').style.display = 'none';
  if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
});

// Server stats
const serverInfoEl = document.getElementById('server-info');
function si(label, value) { return `<span class="label">${label}</span> <span class="val">${value}</span>`; }
function fmtMB(mb) { return mb >= 1024 ? (mb/1024).toFixed(1) + ' GB' : mb + ' MB'; }
let serverOnline = false;
function renderStats(d) {
  const parts = [];
  const gpu = d.gpu_name || d.backend || '?';
  parts.push(si('device', gpu + (d.arch ? ' (' + d.arch + ')' : '')));
  const models = d.models || {};
  const names = Object.entries(models).map(([k,v]) => {
    const short = v.includes('/') || v.includes('\\') ? v.split(/[/\\]/).pop() : v;
    return k.toUpperCase() + ': ' + short;
  });
  if (names.length) parts.push(si('models', names.join(', ')));
  if (d.tinygrad_mem_mb != null) {
    let mem = 'tinygrad ' + fmtMB(d.tinygrad_mem_mb);
    if (d.vram_total_mb) mem += ' / ' + fmtMB(d.vram_total_mb) + ' VRAM';
    if (d.vram_free_mb != null) mem += ' (' + fmtMB(d.vram_free_mb) + ' free)';
    parts.push(si('mem', mem));
  }
  if (d.ram_total_mb) parts.push(si('RAM', fmtMB(d.ram_used_mb) + ' / ' + fmtMB(d.ram_total_mb)));
  return parts.join('');
}
async function fetchServerInfo() {
  try {
    const r = await fetch('/v1/stats');
    const d = await r.json();
    serverOnline = true;
    serverInfoEl.style.borderColor = '#2a2a2a';
    serverInfoEl.innerHTML = renderStats(d);
  } catch(e) {
    if (serverOnline || !serverInfoEl.innerHTML) {
      serverOnline = false;
      serverInfoEl.style.borderColor = '#4a1c1c';
      serverInfoEl.innerHTML = si('status', '<span style="color:#f44336">server offline</span>') +
        (serverInfoEl.innerHTML ? ' ' + serverInfoEl.innerHTML.replace(/>mem /g, '>last mem ') : '');
    }
  }
}
fetchServerInfo();
setInterval(fetchServerInfo, 10000);
</script></body></html>
