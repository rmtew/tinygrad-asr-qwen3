<!DOCTYPE html><html><body style="background:#222;color:#eee;font-family:monospace;padding:20px">
<h2>WebSocket Test</h2>
<button onclick="testWS()">Connect</button>
<pre id="log"></pre>
<script>
const log = document.getElementById('log');
function L(msg) { log.textContent += msg + '\n'; console.log(msg); }

function testWS() {
  L('connecting...');
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws`;
  L('url: ' + url);
  const ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    L('onopen');
    ws.send(JSON.stringify({type: 'start'}));
    L('sent start');
  };
  ws.onmessage = e => {
    L('onmessage: ' + e.data);
    // Send a small binary chunk
    const pcm = new Int16Array(1600); // 0.1s silence
    ws.send(pcm.buffer);
    L('sent 1600 samples');
    // Then end
    setTimeout(() => {
      ws.send(JSON.stringify({type: 'end'}));
      L('sent end');
    }, 500);
  };
  ws.onerror = e => L('onerror: ' + JSON.stringify(e));
  ws.onclose = e => L('onclose: code=' + e.code + ' reason=' + e.reason + ' clean=' + e.wasClean);
}
</script></body></html>
